<!--Product HTML:-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">


    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 30px;
            background-color: whitesmoke;
            color: black;
        }

        .page {
            width: 900px;
            max-width: 92%;
            margin: auto;
            padding: 10px 0 20px 0;
        }

        a {
            color: darkgreen;
        }

        .box {
            margin-top: 15px;
        }

        h1, h3 {
            color: darkgreen;
        }

        input, button {
            margin: 8px 8px 8px 0;
        }

        input {
            width: 220px;
        }

        #message {
            margin: 0;
        }
    </style>
</head>

<body>

<div class="ui container page">
    <h1 class="ui green header">Products</h1>

    <p>
        <a href="index.html">Home</a> |
        <a href="product.html">Products</a>
    </p>

    <p>This page lets you search, add, edit, and delete products.</p>

    <div class="ui raised segment form box">
        <h3 class="ui green header">Search by name</h3>
        <input type="text" id="searchName" placeholder="Enter product name">
        <button id="searchButton" class="ui green button">Search</button>
    </div>

    <div class="ui raised segment form box">
        <h3 class="ui green header">Search by id</h3>
        <input type="number" id="searchId" placeholder="Enter product id">
        <button id="searchIdButton" class="ui blue button">Search By ID</button>
        <button id="showAllButton" class="ui teal button">Show All</button>
    </div>

    <div class="ui raised segment form box">
        <h3 class="ui green header">Product form</h3>
        <input type="hidden" id="productId">
        <div>Product name</div>
        <input type="text" id="productName" placeholder="Enter product name">
        <div>Price</div>
        <input type="number" id="productPrice" placeholder="Enter price">
        <br>
        <button id="saveButton" class="ui green button">Save</button>
        <button id="clearButton" class="ui basic button">Clear</button>
    </div>

    <div class="ui raised segment box">
        <h3 class="ui green header">Message</h3>
        <div id="message" class="ui info message">Page ready</div>
    </div>

    <div class="ui raised segment box">
        <h3 class="ui green header">Product List</h3>
        <div id="result"></div>
    </div>
</div>

<script>
    function clearProductInfo() {
        $("#productId").val("");
        $("#productName").val("");
        $("#productPrice").val("");
        $("#message").html("Form cleared");
    }

    function showProducts(data) {
        var htmlTable = "<table class='ui celled striped table'>";
        htmlTable += "<tr>";
        htmlTable += "<th>ID</th>";
        htmlTable += "<th>Name</th>";
        htmlTable += "<th>Price</th>";
        htmlTable += "<th>Actions</th>";
        htmlTable += "</tr>";

        for (var i = 0; i < data.length; i++) {
            var line = data[i];
            htmlTable += "<tr>";
            htmlTable += "<td>" + line.productId + "</td>";
            htmlTable += "<td>" + line.name + "</td>";
            htmlTable += "<td>" + line.price + "</td>";
            htmlTable += "<td>";
            htmlTable += "<button class='ui tiny blue button' onclick='editProduct(" + line.productId + ")'>Edit</button> ";
            htmlTable += "<button class='ui tiny red button' onclick='deleteProduct(" + line.productId + ")'>Delete</button>";
            htmlTable += "</td>";
            htmlTable += "</tr>";
        }

        htmlTable += "</table>";
        $("#result").html(htmlTable);
    }

    function getAllProducts() {
        var apiURL = "/products";
        $.get(apiURL, function(data) {
            if (data.length === 0) {
                $("#message").html("No products found");
                $("#result").html("");
            } else {
                $("#message").html("All products loaded");
                showProducts(data);
            }
        });
    }

    function searchProductByName() {
        var name = $("#searchName").val();
        var apiURL = "/products/search?name=" + name;

        if (name === "") {
            $("#message").html("Please enter a product name");
            return;
        }

        $.get(apiURL, function(data) {
            if (data.length === 0) {
                $("#message").html("No products found");
                $("#result").html("");
            } else {
                $("#message").html("Search completed");
                showProducts(data);
            }
        });
    }

    function searchProductById() {
        var id = $("#searchId").val();
        var apiURL = "/products/" + id;

        if (id === "") {
            $("#message").html("Please enter a product id");
            return;
        }

        $.get(apiURL, function(data) {
            var products = [];
            products.push(data);
            $("#message").html("Search completed");
            showProducts(products);
        }).fail(function() {
            $("#message").html("No product found");
            $("#result").html("");
        });
    }

    function saveProduct() {
        var productId = $("#productId").val();
        var name = $("#productName").val();
        var price = $("#productPrice").val();

        if (name === "" || price === "") {
            $("#message").html("Please enter product name and price");
            return;
        }

        if (productId === "") {
            var apiURL = "/products/add?name=" + name + "&price=" + price;
            $.get(apiURL, function() {
                clearProductInfo();
                $("#message").html("Product added");
                getAllProducts();
            });
        } else {
            var apiURL = "/products/update?productId=" + productId + "&name=" + name + "&price=" + price;
            $.get(apiURL, function() {
                clearProductInfo();
                $("#message").html("Product updated");
                getAllProducts();
            });
        }
    }

    function editProduct(id) {
        var apiURL = "/products/" + id;
        $.get(apiURL, function(data) {
            $("#productId").val(data.productId);
            $("#productName").val(data.name);
            $("#productPrice").val(data.price);
            $("#message").html("Edit the product and press Save");
        });
    }

    function deleteProduct(id) {
        var apiURL = "/products/delete?id=" + id;
        $.get(apiURL, function() {
            clearProductInfo();
            $("#message").html("Product deleted");
            getAllProducts();
        });
    }

    $("#searchButton").click(
        function() {
            searchProductByName();
        }
    );

    $("#searchIdButton").click(
        function searchProductById() {
            var id = $("#searchId").val();

            if (id === "") {
                $("#message").text("Please enter a product id");

            }
        });

    $("#showAllButton").click(
        function() {
            getAllProducts();
        }
    );

    $("#saveButton").click(
        function() {
            saveProduct();
        }
    );

    $("#clearButton").click(
        function() {
            clearProductInfo();
        }
    );

    getAllProducts();
</script>

</body>
</html>
