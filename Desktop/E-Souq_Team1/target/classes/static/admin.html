<!DOCTYPE html>
<html>
<head>
    <title>esouq Admin</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Category Manager</h2>

<div class="card p-3 mb-4">
    <h5>Add New Category</h5>
    <div class="input-group">
        <input type="text" id="nameInput" class="form-control" placeholder="Category Name">
        <input type="text" id="descInput" class="form-control" placeholder="Description">
        <button class="btn btn-success" id="saveBtn">Save Category</button>
    </div>
</div>

<table class="table table-bordered">
    <thead>
    <tr class="table-dark">
        <th>Name</th>
        <th>Description</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody id="catTable">
    </tbody>
</table>

<script>
    // --- function to get and display data ---
    function loadCategories() {
        $.get("/api/categories", function(data) {
            let rows = "";
            data.forEach(cat => {
                // Using Template Literals (Backticks) just like your example
                rows += `
                        <tr>
                            <td>${cat.categoryName}</td>
                            <td>${cat.categoryDescription || 'No description'}</td>
                            <td>
                                <button class="btn btn-danger btn-sm" onclick="deleteCategory(${cat.categoryId})">Delete</button>
                            </td>
                        </tr>`;
            });
            $("#catTable").html(rows); // Set content using .html()
        });
    }

    // --- function that posts data ---
    $("#saveBtn").click(function() {
        let categoryData = {
            categoryName: $("#nameInput").val(),
            categoryDescription: $("#descInput").val()
        };

        $.ajax({
            url: "/api/categories",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify(categoryData),
            success: function() {
                $("#nameInput").val(""); // clears inputs
                $("#descInput").val("");
                loadCategories(); // refreshes table without relaoding page
            }
        });
    });

    // --- function for deleting data ---
    function deleteCategory(id) {
        if(confirm("Are you sure?")) {
            $.ajax({
                url: "/api/categories/" + id,
                type: "DELETE",
                success: function() {
                    loadCategories(); // Refresh table
                }
            });
        }
    }

    // Initial load
    $(document).ready(function() {
        loadCategories();
    });
</script>
</body>
</html>
