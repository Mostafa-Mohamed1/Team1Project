<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products - E-Souq</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
            background-color: whitesmoke;
            color: black;
        }

        .page {
            width: 1100px;
            max-width: 92%;
            margin: auto;
            padding: 10px 0 20px 0;
        }

        a {
            color: darkgreen;
        }

        .box {
            margin-top: 15px;
        }

        h1, h3 {
            color: darkgreen;
        }

        input, button, select {
            margin: 8px 8px 8px 0;
        }

        input, select {
            width: 220px;
            padding: 8px;
        }

        #message {
            margin: 0;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .category-select {
            width: 220px;
            padding: 8px;
        }
    </style>
</head>
<body>

<div class="ui container page">
    <h1 class="ui green header">Products</h1>

    <p>
        <a href="index.html">Home</a> |
        <a href="categories.html">Categories</a> |
        <a href="customers.html">Customers</a> |
        <a href="orders.html">Orders</a>
    </p>

    <p>Manage electronic products in the E-Souq marketplace.</p>

    <!-- Search by name -->
    <div class="ui raised segment form box">
        <h3 class="ui green header">Search Product by Name</h3>
        <input type="text" id="searchName" placeholder="Enter product name">
        <button id="searchButton" class="ui green button">Search</button>
        <button id="showAllButton" class="ui teal button">Show All</button>
    </div>

    <!-- Product Form -->
    <div class="ui raised segment form box">
        <h3 class="ui green header">Product Form</h3>
        <input type="hidden" id="productId">

        <div>Product Name</div>
        <input type="text" id="productName" placeholder="Enter product name">

        <div>Price ($)</div>
        <input type="number" id="productPrice" placeholder="Enter price" step="0.01">

        <div>Category</div>
        <select id="productCategory" class="category-select">
            <option value="">Select a category...</option>
        </select>

        <br>
        <button id="saveButton" class="ui green button">Save</button>
        <button id="clearButton" class="ui basic button">Clear</button>
    </div>

    <!-- Message -->
    <div class="ui raised segment box">
        <h3 class="ui green header">Message</h3>
        <div id="message" class="ui info message">Page ready</div>
    </div>

    <!-- Product List -->
    <div class="ui raised segment box">
        <h3 class="ui green header">Product List</h3>
        <div id="result">
            <div class="loading">Loading products...</div>
        </div>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:8080/api";

    var categoriesList = [];

    // Helper: Escape HTML to prevent XSS
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Show message
    function showMessage(msg, isError = false) {
        $("#message").html(msg).removeClass().addClass(isError ? "ui error message" : "ui info message");
    }

    // Fetch all categories (for dropdown)
    async function fetchCategories() {
        try {
            const response = await fetch(`${API_BASE}/categories`);
            if (!response.ok) throw new Error("Failed to fetch categories");
            categoriesList = await response.json();
            return categoriesList;
        } catch (error) {
            console.error("Error fetching categories:", error);
            return [];
        }
    }

    // Populate category dropdown
    function populateCategoryDropdown(selectedId = null) {
        var select = $("#productCategory");
        select.html("<option value=''>Select a category...</option>");

        for (var i = 0; i < categoriesList.length; i++) {
            var cat = categoriesList[i];
            var selected = (selectedId && cat.categoryId == selectedId) ? "selected" : "";
            select.append(`<option value='${cat.categoryId}' ${selected}>${escapeHtml(cat.categoryName)}</option>`);
        }
    }

    // Fetch all products from API
    async function fetchAllProducts() {
        try {
            const response = await fetch(`${API_BASE}/products`);
            if (!response.ok) throw new Error("Failed to fetch products");
            return await response.json();
        } catch (error) {
            console.error("Error fetching products:", error);
            showMessage("Failed to load products from server", true);
            return [];
        }
    }

    // Search products by name
    async function searchProductsByName(name) {
        try {
            const response = await fetch(`${API_BASE}/products/search?name=${encodeURIComponent(name)}`);
            if (!response.ok) throw new Error("Failed to search products");
            return await response.json();
        } catch (error) {
            console.error("Error searching products:", error);
            showMessage("Search failed", true);
            return [];
        }
    }

    // Create new product
    async function createProduct(product) {
        try {
            const response = await fetch(`${API_BASE}/products`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(product)
            });
            if (!response.ok) throw new Error("Failed to create product");
            return await response.json();
        } catch (error) {
            console.error("Error creating product:", error);
            showMessage("Failed to create product", true);
            return null;
        }
    }

    // Update existing product
    async function updateProduct(id, product) {
        try {
            const response = await fetch(`${API_BASE}/products/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(product)
            });
            if (!response.ok) throw new Error("Failed to update product");
            return await response.json();
        } catch (error) {
            console.error("Error updating product:", error);
            showMessage("Failed to update product", true);
            return null;
        }
    }

    // Delete product
    async function deleteProduct(id) {
        try {
            const response = await fetch(`${API_BASE}/products/${id}`, {
                method: "DELETE"
            });
            if (!response.ok) throw new Error("Failed to delete product");
            return true;
        } catch (error) {
            console.error("Error deleting product:", error);
            showMessage("Failed to delete product", true);
            return false;
        }
    }

    // Get category name by ID
    function getCategoryName(categoryId) {
        for (var i = 0; i < categoriesList.length; i++) {
            if (categoriesList[i].categoryId === categoryId) {
                return categoriesList[i].categoryName;
            }
        }
        return "Uncategorized";
    }

    // Display products in table
    function displayProducts(products) {
        if (!products || products.length === 0) {
            $("#result").html("<p class='loading'>No products found.</p>");
            return;
        }

        var htmlTable = "<table class='ui celled striped table'>";
        htmlTable += "<thead><tr>";
        htmlTable += "<th>ID</th>";
        htmlTable += "<th>Product Name</th>";
        htmlTable += "<th>Price</th>";
        htmlTable += "<th>Category</th>";
        htmlTable += "<th>Actions</th>";
        htmlTable += "</tr></thead><tbody>";

        for (var i = 0; i < products.length; i++) {
            var p = products[i];
            var categoryName = p.category ? p.category.categoryName : "Uncategorized";

            htmlTable += "<tr>";
            htmlTable += "<td>" + p.productId + "</td>";
            htmlTable += "<td>" + escapeHtml(p.name) + "</td>";
            htmlTable += "<td>$" + parseFloat(p.price).toFixed(2) + "</td>";
            htmlTable += "<td>" + escapeHtml(categoryName) + "</td>";
            htmlTable += "<td>";
            htmlTable += "<button class='ui tiny blue button' onclick='editProduct(" + p.productId + ")'>Edit</button> ";
            htmlTable += "<button class='ui tiny red button' onclick='deleteProductById(" + p.productId + ")'>Delete</button>";
            htmlTable += "</td>";
            htmlTable += "</tr>";
        }

        htmlTable += "</tbody></table>";
        $("#result").html(htmlTable);
    }

    // Load and display all products
    async function loadAllProducts() {
        showMessage("Loading products...");
        $("#result").html("<div class='loading'>Loading products...</div>");

        await fetchCategories();
        populateCategoryDropdown();

        const products = await fetchAllProducts();
        displayProducts(products);

        if (products.length > 0) {
            showMessage(`Loaded ${products.length} products successfully`);
        } else {
            showMessage("No products found. Add your first product!");
        }
    }

    // Clear form
    function clearProductForm() {
        $("#productId").val("");
        $("#productName").val("");
        $("#productPrice").val("");
        $("#productCategory").val("");
        showMessage("Form cleared. Ready to add new product.");
    }

    // Edit product (populate form)
    async function editProduct(id) {
        try {
            const response = await fetch(`${API_BASE}/products/${id}`);
            if (!response.ok) throw new Error("Failed to fetch product");
            const product = await response.json();

            $("#productId").val(product.productId);
            $("#productName").val(product.name);
            $("#productPrice").val(product.price);

            // Set category in dropdown
            if (product.category && product.category.categoryId) {
                $("#productCategory").val(product.category.categoryId);
            } else {
                $("#productCategory").val("");
            }

            showMessage(`Editing product: ${product.name}. Click Save to update.`);
        } catch (error) {
            console.error("Error fetching product for edit:", error);
            showMessage("Failed to load product data", true);
        }
    }

    // Delete product by ID
    async function deleteProductById(id) {
        if (confirm("Are you sure you want to delete this product?")) {
            const success = await deleteProduct(id);
            if (success) {
                showMessage("Product deleted successfully");
                await loadAllProducts();
                clearProductForm();
            }
        }
    }

    // Save product (create or update)
    async function saveProduct() {
        var productId = $("#productId").val();
        var name = $("#productName").val().trim();
        var price = $("#productPrice").val().trim();
        var categoryId = $("#productCategory").val();

        if (name === "" || price === "") {
            showMessage("Please fill in Product Name and Price", true);
            return;
        }

        if (isNaN(parseFloat(price))) {
            showMessage("Please enter a valid price", true);
            return;
        }

        // Find category object if selected
        var category = null;
        if (categoryId) {
            for (var i = 0; i < categoriesList.length; i++) {
                if (categoriesList[i].categoryId == categoryId) {
                    category = categoriesList[i];
                    break;
                }
            }
        }

        var productData = {
            name: name,
            price: parseFloat(price),
            category: category
        };

        var result;

        if (productId === "") {
            // Create new product
            result = await createProduct(productData);
            if (result) {
                showMessage("Product created successfully!");
                clearProductForm();
                await loadAllProducts();
            }
        } else {
            // Update existing product
            productData.productId = parseInt(productId);
            result = await updateProduct(productId, productData);
            if (result) {
                showMessage("Product updated successfully!");
                clearProductForm();
                await loadAllProducts();
            }
        }
    }

    // Search by name
    async function searchByName() {
        var name = $("#searchName").val().trim();

        if (name === "") {
            showMessage("Please enter a product name to search", true);
            return;
        }

        showMessage(`Searching for products with name containing: ${name}...`);
        $("#result").html("<div class='loading'>Searching...</div>");

        const products = await searchProductsByName(name);
        displayProducts(products);

        if (products.length === 0) {
            showMessage(`No products found with name containing "${name}"`);
        } else {
            showMessage(`Found ${products.length} product(s) matching "${name}"`);
        }
    }

    // Event handlers
    $("#searchButton").click(function() {
        searchByName();
    });

    $("#showAllButton").click(function() {
        loadAllProducts();
    });

    $("#saveButton").click(function() {
        saveProduct();
    });

    $("#clearButton").click(function() {
        clearProductForm();
    });

    // Press Enter in search field
    $("#searchName").keypress(function(e) {
        if (e.which === 13) {
            searchByName();
        }
    });

    // Initial load
    loadAllProducts();
</script>

</body>
</html>
