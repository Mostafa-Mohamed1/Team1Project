<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products - E‑Souq</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', Arial, sans-serif; }
        .page { max-width: 1200px; margin: auto; padding: 1.5rem; }
        .card-custom { border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); transition: 0.2s; }
        .card-custom:hover { box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1); }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1100; }
        .table-responsive { border-radius: 1rem; overflow: hidden; }
        .btn-action { margin: 0 2px; }
    </style>
</head>
<body>

<div class="page">
    <!-- header and nav -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-success"><i class="bi bi-box-seam"></i> Products</h1>
        <div>
            <a href="index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-house"></i> Home</a>
            <a href="categories.html" class="btn btn-outline-secondary btn-sm">Categories</a>
            <a href="customers.html" class="btn btn-outline-secondary btn-sm">Customers</a>
            <a href="orders.html" class="btn btn-outline-secondary btn-sm">Orders</a>
        </div>
    </div>

    <p class="lead">Manage your electronic products: add, edit, search, and delete.</p>

    <!-- search bar -->
    <div class="card card-custom mb-4">
        <div class="card-header bg-white fw-bold"><i class="bi bi-search"></i> Search product</div>
        <div class="card-body">
            <div class="input-group">
                <input type="text" id="searchName" class="form-control" placeholder="Product name...">
                <button id="searchButton" class="btn btn-success">Search</button>
                <button id="showAllButton" class="btn btn-outline-secondary">Show all</button>
            </div>
        </div>
    </div>

    <!-- product form -->
    <div class="card card-custom mb-4">
        <div class="card-header bg-white fw-bold"><i class="bi bi-pencil-square"></i> Product form</div>
        <div class="card-body">
            <input type="hidden" id="productId">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Product name</label>
                    <input type="text" id="productName" class="form-control" placeholder="e.g. iPhone 15">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Price ($)</label>
                    <input type="number" id="productPrice" class="form-control" step="0.01" placeholder="0.00">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Category</label>
                    <select id="productCategory" class="form-select">
                        <option value="">– Select category –</option>
                    </select>
                </div>
                <div class="col-md-1 d-flex align-items-end">
                    <button id="saveButton" class="btn btn-success w-100"><i class="bi bi-save"></i> Save</button>
                </div>
            </div>
            <div class="mt-3">
                <button id="clearButton" class="btn btn-outline-secondary">Clear form</button>
            </div>
        </div>
    </div>

    <!-- products table -->
    <div class="card card-custom">
        <div class="card-header bg-white fw-bold"><i class="bi bi-table"></i> Product inventory</div>
        <div class="card-body">
            <div id="result" class="table-responsive">
                <div class="text-center py-5"><div class="spinner-border text-success"></div> Loading products...</div>
            </div>
        </div>
    </div>
</div>

<!-- toast container -->
<div class="toast-container"></div>

<script>
    const API_BASE = "http://localhost:8080/api";
    let categoriesList = [];

    // helper for toast notifications
    function showToast(message, type = 'success') {
        const toastHtml = `<div class="toast align-items-center text-white bg-${type} border-0" role="alert" data-bs-autohide="true" data-bs-delay="3000">
            <div class="d-flex"><div class="toast-body">${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>
        </div>`;
        $('.toast-container').append(toastHtml);
        const toastEl = $('.toast-container .toast').last();
        const bsToast = new bootstrap.Toast(toastEl[0], { delay: 3000 });
        bsToast.show();
        toastEl.on('hidden.bs.toast', function() { $(this).remove(); });
    }

    // fetch dropdown categories
    async function fetchCategories() {
        try {
            const res = await fetch(`${API_BASE}/categories`);
            if (!res.ok) throw new Error();
            categoriesList = await res.json();
        } catch(e) {
            console.error("Categories load failed", e);
            categoriesList = [];
        }
    }

    function populateCategoryDropdown(selectedId = null) {
        const select = $("#productCategory");
        select.html('<option value="">– Select category –</option>');
        categoriesList.forEach(cat => {
            const selected = (selectedId && cat.categoryId == selectedId) ? 'selected' : '';
            select.append(`<option value="${cat.categoryId}" ${selected}>${cat.categoryName}</option>`);
        });
    }

    // fetch all produicts
    async function fetchAllProducts() {
        try {
            const res = await fetch(`${API_BASE}/products`);
            if (!res.ok) throw new Error();
            return await res.json();
        } catch(e) {
            showToast("Failed to load products", "danger");
            return [];
        }
    }

    async function searchProductsByName(name) {
        try {
            const res = await fetch(`${API_BASE}/products/search?name=${encodeURIComponent(name)}`);
            if (!res.ok) throw new Error();
            return await res.json();
        } catch(e) {
            showToast("Search failed", "danger");
            return [];
        }
    }

    async function createProduct(product) {
        const res = await fetch(`${API_BASE}/products`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(product)
        });
        if (!res.ok) throw new Error("Create failed");
        return await res.json();
    }

    async function updateProduct(id, product) {
        const res = await fetch(`${API_BASE}/products/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(product)
        });
        if (!res.ok) throw new Error("Update failed");
        return await res.json();
    }

    async function deleteProduct(id) {
        const res = await fetch(`${API_BASE}/products/${id}`, { method: "DELETE" });
        if (!res.ok) throw new Error("Delete failed");
        return true;
    }

    // display products as bootstrap table
    function displayProducts(products) {
        if (!products || products.length === 0) {
            $("#result").html('<div class="alert alert-info">No products found. Please add a product</div>');
            return;
        }
        let html = `<table class="table table-striped table-hover align-middle">
            <thead class="table-success"><tr>
                <th>ID</th><th>Product name</th><th>Price</th><th>Category</th><th>Actions</th>
            </tr></thead><tbody>`;
        products.forEach(p => {
            const categoryName = p.category ? p.category.categoryName : 'Uncategorized';
            html += `<tr>
                <td>${p.productId}</td>
                <td>${p.name}</td>
                <td>$${parseFloat(p.price).toFixed(2)}</td>
                <td>${categoryName}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary btn-action" onclick="editProduct(${p.productId})"><i class="bi bi-pencil"></i> Edit</button>
                    <button class="btn btn-sm btn-outline-danger btn-action" onclick="deleteProductById(${p.productId})"><i class="bi bi-trash"></i> Delete</button>
                </td>
            </tr>`;
        });
        html += `</tbody></table>`;
        $("#result").html(html);
    }

    async function loadAllProducts() {
        $("#result").html('<div class="text-center py-5"><div class="spinner-border text-success"></div> Loading products...</div>');
        await fetchCategories();
        populateCategoryDropdown();
        const products = await fetchAllProducts();
        displayProducts(products);
        showToast(`Loaded ${products.length} products`, 'success');
    }

    function clearProductForm() {
        $("#productId").val("");
        $("#productName").val("");
        $("#productPrice").val("");
        $("#productCategory").val("");
        showToast("Form cleared. Ready to add new product.", 'info');
    }

    async function editProduct(id) {
        try {
            const res = await fetch(`${API_BASE}/products/${id}`);
            if (!res.ok) throw new Error();
            const product = await res.json();
            $("#productId").val(product.productId);
            $("#productName").val(product.name);
            $("#productPrice").val(product.price);
            if (product.category && product.category.categoryId) {
                $("#productCategory").val(product.category.categoryId);
            } else {
                $("#productCategory").val("");
            }
            showToast(`Editing: ${product.name}`, 'info');
        } catch(e) {
            showToast("Could not load product details", "danger");
        }
    }

    async function deleteProductById(id) {
        if (!confirm("Delete this product permanently?")) return;
        try {
            await deleteProduct(id);
            showToast("Product deleted", "success");
            await loadAllProducts();
            clearProductForm();
        } catch(e) {
            showToast("Delete failed", "danger");
        }
    }

    async function saveProduct() {
        const productId = $("#productId").val();
        const name = $("#productName").val().trim();
        const price = $("#productPrice").val().trim();
        const categoryId = $("#productCategory").val();

        if (!name || !price) {
            showToast("Product name and price are required", "danger");
            return;
        }
        if (isNaN(parseFloat(price))) {
            showToast("Price must be a number", "danger");
            return;
        }
        let category = null;
        if (categoryId) {
            category = categoriesList.find(c => c.categoryId == categoryId);
        }
        const productData = { name, price: parseFloat(price), category };

        try {
            if (productId === "") {
                await createProduct(productData);
                showToast("Product created successfully", "success");
            } else {
                productData.productId = parseInt(productId);
                await updateProduct(productId, productData);
                showToast("Product updated", "success");
            }
            clearProductForm();
            await loadAllProducts();
        } catch(e) {
            showToast("Failed to save product", "danger");
        }
    }

    async function searchByName() {
        const name = $("#searchName").val().trim();
        if (!name) {
            showToast("Enter a product name to search", "danger");
            return;
        }
        $("#result").html('<div class="text-center py-5"><div class="spinner-border text-success"></div> Searching...</div>');
        const products = await searchProductsByName(name);
        displayProducts(products);
        if (products.length === 0) {
            showToast(`No products match "${name}"`, "info");
        } else {
            showToast(`Found ${products.length} product(s)`, "success");
        }
    }

    // event binding
    $("#searchButton").click(searchByName);
    $("#showAllButton").click(loadAllProducts);
    $("#saveButton").click(saveProduct);
    $("#clearButton").click(clearProductForm);
    $("#searchName").keypress(e => { if (e.which === 13) searchByName(); });

    // initial load
    loadAllProducts();
</script>
</body>
</html>
