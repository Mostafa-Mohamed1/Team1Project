<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customers: E‑Souq</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', Arial, sans-serif; }
        .page { max-width: 1200px; margin: auto; padding: 1.5rem; }
        .card-custom { border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); transition: 0.2s; }
        .card-custom:hover { box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1); }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1100; }
        .table-responsive { border-radius: 1rem; overflow: hidden; }
        .btn-action { margin: 0 2px; }
    </style>
</head>
<body>

<div class="page">
    <!-- header and nav -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-success"><i class="bi bi-people"></i> Customers</h1>
        <div>
            <a href="index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-house"></i> Home</a>
            <a href="products.html" class="btn btn-outline-secondary btn-sm">Products</a>
            <a href="categories.html" class="btn btn-outline-secondary btn-sm">Categories</a>
            <a href="orders.html" class="btn btn-outline-secondary btn-sm">Orders</a>
        </div>
    </div>

    <p class="lead">Manage customer profiles: add, edit, search by email, and delete.</p>

    <!-- search by email -->
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="card card-custom h-100">
                <div class="card-header bg-white fw-bold"><i class="bi bi-envelope"></i> Search by email</div>
                <div class="card-body">
                    <div class="input-group">
                        <input type="email" id="searchEmail" class="form-control" placeholder="customer@example.com">
                        <button id="searchButton" class="btn btn-success">Search</button>
                        <button id="showAllButton" class="btn btn-outline-secondary">Show all</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- customer form -->
    <div class="card card-custom mb-4">
        <div class="card-header bg-white fw-bold"><i class="bi bi-person-badge"></i> Customer form</div>
        <div class="card-body">
            <input type="hidden" id="customerId">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">First name</label>
                    <input type="text" id="customerFirstName" class="form-control" placeholder="John">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Last name</label>
                    <input type="text" id="customerLastName" class="form-control" placeholder="Doe">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Email address</label>
                    <input type="email" id="customerEmail" class="form-control" placeholder="john.doe@example.com">
                </div>
                <div class="col-md-12 d-flex gap-2 mt-2">
                    <button id="saveButton" class="btn btn-success"><i class="bi bi-save"></i> Save customer</button>
                    <button id="clearButton" class="btn btn-outline-secondary">Clear form</button>
                </div>
            </div>
        </div>
    </div>

    <!-- customer table -->
    <div class="card card-custom">
        <div class="card-header bg-white fw-bold"><i class="bi bi-table"></i> Customer directory</div>
        <div class="card-body">
            <div id="result" class="table-responsive">
                <div class="text-center py-5"><div class="spinner-border text-success"></div> Loading customers...</div>
            </div>
        </div>
    </div>
</div>

<!-- toast container -->
<div class="toast-container"></div>

<script>
    const API_BASE = "http://localhost:8080/api";

    // toast popup helper
    function showToast(message, type = 'success') {
        const toastHtml = `<div class="toast align-items-center text-white bg-${type} border-0" role="alert" data-bs-autohide="true" data-bs-delay="3000">
            <div class="d-flex"><div class="toast-body">${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>
        </div>`;
        $('.toast-container').append(toastHtml);
        const toastEl = $('.toast-container .toast').last();
        const bsToast = new bootstrap.Toast(toastEl[0], { delay: 3000 });
        bsToast.show();
        toastEl.on('hidden.bs.toast', function() { $(this).remove(); });
    }

    // display customers in table
    function displayCustomers(customers) {
        if (!customers || customers.length === 0) {
            $("#result").html('<div class="alert alert-info">No customers found. Please add a customer</div>');
            return;
        }
        let html = `<table class="table table-striped table-hover align-middle">
            <thead class="table-success"><tr>
                <th>ID</th><th>First name</th><th>Last name</th><th>Email</th><th>Actions</th>
            </thead><tbody>`;
        customers.forEach(c => {
            html += `<tr>
                <td>${c.id}</td>
                <td>${escapeHtml(c.firstName)}</td>`;
            html += `<td>${escapeHtml(c.lastName)}</td>`;
            html += `<td>${escapeHtml(c.email)}</td>`;
            html += `<td>
                    <button class="btn btn-sm btn-outline-primary btn-action" onclick="editCustomer(${c.id})"><i class="bi bi-pencil"></i> Edit</button>
                    <button class="btn btn-sm btn-outline-danger btn-action" onclick="deleteCustomerById(${c.id})"><i class="bi bi-trash"></i> Delete</button>
                </td>
            </tr>`;
        });
        html += `</tbody></table>`;
        $("#result").html(html);
    }

    // api endpoint calls
    async function fetchAllCustomers() {
        try {
            const res = await fetch(`${API_BASE}/customers`);
            if (!res.ok) throw new Error();
            return await res.json();
        } catch (e) {
            showToast("Failed to load customers", "danger");
            return [];
        }
    }

    async function searchCustomersByEmail(email) {
        try {
            const res = await fetch(`${API_BASE}/customers/search?email=${encodeURIComponent(email)}`);
            if (!res.ok) throw new Error();
            return await res.json();
        } catch (e) {
            showToast("Search failed", "danger");
            return [];
        }
    }

    async function createCustomer(customer) {
        const res = await fetch(`${API_BASE}/customers`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(customer)
        });
        if (!res.ok) throw new Error();
        return await res.json();
    }

    async function updateCustomer(id, customer) {
        const res = await fetch(`${API_BASE}/customers/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(customer)
        });
        if (!res.ok) throw new Error();
        return await res.json();
    }

    async function deleteCustomer(id) {
        const res = await fetch(`${API_BASE}/customers/${id}`, { method: "DELETE" });
        if (!res.ok) throw new Error();
        return true;
    }

    // load all custoemrs
    async function loadAllCustomers() {
        $("#result").html('<div class="text-center py-5"><div class="spinner-border text-success"></div> Loading customers...</div>');
        const customers = await fetchAllCustomers();
        displayCustomers(customers);
        showToast(`Loaded ${customers.length} customers`, 'success');
    }

    // search customer by email
    async function searchByEmail() {
        const email = $("#searchEmail").val().trim();
        if (!email) {
            showToast("Please enter an email to search", "danger");
            return;
        }
        $("#result").html('<div class="text-center py-5"><div class="spinner-border text-success"></div> Searching...</div>');
        const customers = await searchCustomersByEmail(email);
        displayCustomers(customers);
        if (customers.length === 0) {
            showToast(`No customers with email containing "${email}"`, "info");
        } else {
            showToast(`Found ${customers.length} customer(s)`, "success");
        }
    }

    // clear form
    function clearCustomerForm() {
        $("#customerId").val("");
        $("#customerFirstName").val("");
        $("#customerLastName").val("");
        $("#customerEmail").val("");
        showToast("Form cleared", "info");
    }

    // edit customer
    async function editCustomer(id) {
        try {
            const res = await fetch(`${API_BASE}/customers/${id}`);
            if (!res.ok) throw new Error();
            const c = await res.json();
            $("#customerId").val(c.id);
            $("#customerFirstName").val(c.firstName);
            $("#customerLastName").val(c.lastName);
            $("#customerEmail").val(c.email);
            showToast(`Editing: ${c.firstName} ${c.lastName}`, "info");
        } catch (e) {
            showToast("Failed to load customer details", "danger");
        }
    }

    // delete cust
    async function deleteCustomerById(id) {
        if (!confirm("Delete this customer permanently? Orders associated will be affected.")) return;
        try {
            await deleteCustomer(id);
            showToast("Customer deleted", "success");
            await loadAllCustomers();
            clearCustomerForm();
        } catch (e) {
            showToast("Delete failed", "danger");
        }
    }

    // save customer update/delete
    async function saveCustomer() {
        const customerId = $("#customerId").val();
        const firstName = $("#customerFirstName").val().trim();
        const lastName = $("#customerLastName").val().trim();
        const email = $("#customerEmail").val().trim();

        if (!firstName || !lastName || !email) {
            showToast("Please fill all fields (first name, last name, email)", "danger");
            return;
        }

        const customerData = { firstName, lastName, email };

        try {
            if (customerId === "") {
                await createCustomer(customerData);
                showToast("Customer created successfully", "success");
            } else {
                await updateCustomer(customerId, customerData);
                showToast("Customer updated", "success");
            }
            clearCustomerForm();
            await loadAllCustomers();
        } catch (e) {
            showToast("Failed to save customer", "danger");
        }
    }

    // event binding
    $("#searchButton").click(searchByEmail);
    $("#showAllButton").click(loadAllCustomers);
    $("#saveButton").click(saveCustomer);
    $("#clearButton").click(clearCustomerForm);
    $("#searchEmail").keypress(e => { if (e.which === 13) searchByEmail(); });

    // initial load
    loadAllCustomers();
</script>
</body>
</html>
