<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Categories: E‑Souq</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', Arial, sans-serif; }
        .page { max-width: 1100px; margin: auto; padding: 1.5rem; }
        .card-custom { border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); transition: 0.2s; }
        .card-custom:hover { box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1); }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1100; }
        .table-responsive { border-radius: 1rem; overflow: hidden; }
        .btn-action { margin: 0 2px; }
    </style>
</head>
<body>

<div class="page">
    <!-- Header & navigation -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-success"><i class="bi bi-tags"></i> Categories</h1>
        <div>
            <a href="index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-house"></i> Home</a>
            <a href="products.html" class="btn btn-outline-secondary btn-sm">Products</a>
            <a href="customers.html" class="btn btn-outline-secondary btn-sm">Customers</a>
            <a href="orders.html" class="btn btn-outline-secondary btn-sm">Orders</a>
        </div>
    </div>

    <p class="lead">Organize your products into categories: add, edit, search, and delete.</p>

    <!-- Search row (name + ID) -->
    <div class="row g-3 mb-4">
        <div class="col-md-5">
            <div class="card card-custom h-100">
                <div class="card-header bg-white fw-bold"><i class="bi bi-search"></i> Search by name</div>
                <div class="card-body">
                    <div class="input-group">
                        <input type="text" id="searchName" class="form-control" placeholder="e.g. Electronics">
                        <button id="searchButton" class="btn btn-success">Search</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card card-custom h-100">
                <div class="card-header bg-white fw-bold"><i class="bi bi-hash"></i> Search by ID</div>
                <div class="card-body">
                    <div class="input-group">
                        <input type="number" id="searchId" class="form-control" placeholder="Category ID">
                        <button id="searchIdButton" class="btn btn-primary">Search</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button id="showAllButton" class="btn btn-outline-secondary w-100"><i class="bi bi-arrow-repeat"></i> Show all</button>
        </div>
    </div>

    <!-- Category form -->
    <div class="card card-custom mb-4">
        <div class="card-header bg-white fw-bold"><i class="bi bi-pencil-square"></i> Category form</div>
        <div class="card-body">
            <input type="hidden" id="categoryId">
            <div class="row g-3">
                <div class="col-md-5">
                    <label class="form-label">Category name</label>
                    <input type="text" id="categoryName" class="form-control" placeholder="e.g. Smartphones">
                </div>
                <div class="col-md-5">
                    <label class="form-label">Description</label>
                    <input type="text" id="categoryDescription" class="form-control" placeholder="Brief description">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button id="saveButton" class="btn btn-success w-100"><i class="bi bi-save"></i> Save</button>
                </div>
            </div>
            <div class="mt-3">
                <button id="clearButton" class="btn btn-outline-secondary">Clear form</button>
            </div>
        </div>
    </div>

    <!-- Categories table -->
    <div class="card card-custom">
        <div class="card-header bg-white fw-bold"><i class="bi bi-table"></i> Category list</div>
        <div class="card-body">
            <div id="result" class="table-responsive">
                <div class="text-center py-5"><div class="spinner-border text-success"></div> Loading categories...</div>
            </div>
        </div>
    </div>
</div>

<!-- toast container -->
<div class="toast-container"></div>

<script>
    const API_BASE = "http://localhost:8080/api";

    // toast notificaiton helper
    function showToast(message, type = 'success') {
        const toastHtml = `<div class="toast align-items-center text-white bg-${type} border-0" role="alert" data-bs-autohide="true" data-bs-delay="3000">
            <div class="d-flex"><div class="toast-body">${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>
        </div>`;
        $('.toast-container').append(toastHtml);
        const toastEl = $('.toast-container .toast').last();
        const bsToast = new bootstrap.Toast(toastEl[0], { delay: 3000 });
        bsToast.show();
        toastEl.on('hidden.bs.toast', function() { $(this).remove(); });
    }

    // displays categories in bootstrap table
    function showCategories(categories) {
        if (!categories || categories.length === 0) {
            $("#result").html('<div class="alert alert-info">No categories found. Create your first category!</div>');
            return;
        }
        let html = `<table class="table table-striped table-hover align-middle">
            <thead class="table-success"><tr>
                <th>ID</th><th>Name</th><th>Description</th><th>Actions</th>
            </thead><tbody>`;
        categories.forEach(cat => {
            html += `<tr>
                <td>${cat.categoryId}</td>
                <td>${escapeHtml(cat.categoryName)}</td>
                <td>${escapeHtml(cat.categoryDescription) || '—'}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary btn-action" onclick="editCategory(${cat.categoryId})"><i class="bi bi-pencil"></i> Edit</button>
                    <button class="btn btn-sm btn-outline-danger btn-action" onclick="deleteCategoryById(${cat.categoryId})"><i class="bi bi-trash"></i> Delete</button>
                </td>
            </tr>`;
        });
        html += `</tbody></table>`;
        $("#result").html(html);
    }

    // api endpoint calls
    function getAllCategories() {
        $("#result").html('<div class="text-center py-5"><div class="spinner-border text-success"></div> Loading categories...</div>');
        $.get(API_BASE + "/categories")
            .done(data => {
                showCategories(data);
                showToast(`Loaded ${data.length} categories`, 'success');
            })
            .fail(() => showToast("Failed to load categories", "danger"));
    }

    function searchCategoryByName() {
        const name = $("#searchName").val().trim();
        if (!name) {
            showToast("Please enter a category name", "danger");
            return;
        }
        $("#result").html('<div class="text-center py-5"><div class="spinner-border text-success"></div> Searching...</div>');
        $.get(API_BASE + "/categories/search?name=" + encodeURIComponent(name))
            .done(data => {
                showCategories(data);
                if (data.length === 0) showToast(`No categories matching "${name}"`, "info");
                else showToast(`Found ${data.length} category(s)`, "success");
            })
            .fail(() => showToast("Search failed", "danger"));
    }

    function searchCategoryById() {
        const id = $("#searchId").val();
        if (!id) {
            showToast("Please enter a category ID", "danger");
            return;
        }
        $("#result").html('<div class="text-center py-5"><div class="spinner-border text-success"></div> Searching...</div>');
        $.get(API_BASE + "/categories/" + id)
            .done(data => {
                showCategories([data]);
                showToast(`Category found: ${data.categoryName}`, "success");
            })
            .fail(() => {
                showToast("No category found with that ID", "danger");
                $("#result").html('<div class="alert alert-warning">No category found.</div>');
            });
    }

    function saveCategory() {
        const categoryId = $("#categoryId").val();
        const name = $("#categoryName").val().trim();
        const description = $("#categoryDescription").val().trim();

        if (!name || !description) {
            showToast("Please fill both name and description", "danger");
            return;
        }

        const categoryData = {
            categoryName: name,
            categoryDescription: description
        };

        if (categoryId === "") {
            // Create
            $.ajax({
                url: API_BASE + "/categories",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify(categoryData),
                success: () => {
                    clearCategoryInfo();
                    showToast("Category added successfully", "success");
                    getAllCategories();
                },
                error: () => showToast("Failed to create category", "danger")
            });
        } else {
            // Update
            $.ajax({
                url: API_BASE + "/categories/" + categoryId,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify(categoryData),
                success: () => {
                    clearCategoryInfo();
                    showToast("Category updated", "success");
                    getAllCategories();
                },
                error: () => showToast("Failed to update category", "danger")
            });
        }
    }

    function editCategory(id) {
        $.get(API_BASE + "/categories/" + id)
            .done(data => {
                $("#categoryId").val(data.categoryId);
                $("#categoryName").val(data.categoryName);
                $("#categoryDescription").val(data.categoryDescription);
                showToast(`Editing: ${data.categoryName}`, "info");
            })
            .fail(() => showToast("Could not load category details", "danger"));
    }

    function deleteCategoryById(id) {
        if (!confirm("Delete this category permanently?\nProducts in this category will become uncategorized.")) return;
        $.ajax({
            url: API_BASE + "/categories/" + id,
            type: "DELETE",
            success: () => {
                clearCategoryInfo();
                showToast("Category deleted", "success");
                getAllCategories();
            },
            error: () => showToast("Delete failed (maybe category has products?)", "danger")
        });
    }

    function clearCategoryInfo() {
        $("#categoryId").val("");
        $("#categoryName").val("");
        $("#categoryDescription").val("");
        showToast("Form cleared", "info");
    }

    // Event binding
    $("#searchButton").click(searchCategoryByName);
    $("#searchIdButton").click(searchCategoryById);
    $("#showAllButton").click(getAllCategories);
    $("#saveButton").click(saveCategory);
    $("#clearButton").click(clearCategoryInfo);

    // shortcut with enter key
    $("#searchName").keypress(e => { if (e.which === 13) searchCategoryByName(); });
    $("#searchId").keypress(e => { if (e.which === 13) searchCategoryById(); });

    // initial load
    getAllCategories();
</script>
</body>
</html>
